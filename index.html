<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR 橋梁檢測系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; }
        /* 讓影片和畫布完全重疊，填滿螢幕 */
        #videoElement { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #canvasElement { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 2; pointer-events: none; }
        #uiContainer { position: absolute; top: 20px; left: 20px; z-index: 3; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #4CAF50; }
        h1 { margin: 0 0 10px 0; font-size: 20px; color: #4CAF50; }
        #fps { font-size: 14px; color: #ffeb3b; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="uiContainer">
        <h1>🌉 即時快篩</h1>
        <p id="statusText">系統狀態：準備載入模型...</p>
        <p id="fps">FPS: --</p>
    </div>

    <video id="videoElement" autoplay playsinline muted></video>
    <canvas id="canvasElement"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('statusText');
        const fpsText = document.getElementById('fps');
        let model;
        let lastFrameTime = 0;

        // 定義您的 3 種劣化名稱與對應的專業顏色
        const classNames = ['鋼筋暴露 (RB)', '混凝土剝落 (RC)', '裂縫 (crack)'];
        const classColors = ['#FF9500', '#AF52DE', '#FF3B30'];

        // 1. 啟動後置攝影機
        async function setupCamera() {
            statusText.innerText = "系統狀態：正在開啟攝影機...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve(video);
                    };
                });
            } catch (error) {
                statusText.innerText = "❌ 無法取得攝影機權限！";
            }
        }

        // 2. 載入 YOLOv8 TFJS 模型
        async function loadModel() {
            statusText.innerText = "系統狀態：載入 AI 中 (首次載入需幾秒鐘)...";
            try {
                // 指向您 GitHub Pages 上的 model.json
                model = await tf.loadGraphModel('https://hosegaplus-spec.github.io/YTCIDBAI/model.json');
                statusText.innerText = "✅ 模型載入完成！開始實時檢測。";
            } catch (error) {
                statusText.innerText = "❌ 載入失敗！請確認檔案路徑與 CORS 設定。";
                console.error(error);
            }
        }

        // --- IoU 計算函數 (NMS 過濾用) ---
        function calculateIoU(box1, box2) {
            const xA = Math.max(box1.x, box2.x);
            const yA = Math.max(box1.y, box2.y);
            const xB = Math.min(box1.x + box1.width, box2.x + box2.width);
            const yB = Math.min(box1.y + box1.height, box2.y + box2.height);

            const interArea = Math.max(0, xB - xA) * Math.max(0, yB - yA);
            const box1Area = box1.width * box1.height;
            const box2Area = box2.width * box2.height;
            const unionArea = box1Area + box2Area - interArea;

            return interArea / unionArea;
        }

        // 3. 即時辨識迴圈 (核心引擎)
        async function detectFrame() {
            if (!model) return;

            // 計算 FPS
            const now = performance.now();
            const fps = Math.round(1000 / (now - lastFrameTime));
            lastFrameTime = now;
            fpsText.innerText = `FPS: ${fps}`;

            // 設定畫布尺寸與影片一致
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // tf.tidy 會自動清理記憶體，防止手機瀏覽器崩潰
            tf.tidy(() => {
                // 將影像轉為 640x640 的 Tensor
                const tfImg = tf.browser.fromPixels(video)
                    .resizeBilinear([640, 640])
                    .div(255.0)
                    .expandDims(0);

                // 進行預測
                const predictions = model.predict(tfImg);
                
                // 解析 YOLOv8 輸出 [1, 9, 8400]
                const data = predictions.dataSync();
                const numClasses = 3; 
                const numAnchors = 8400; 

                let rawBoxes = [];

                // 第一階段：抓出所有超過信心度門檻的框
                for (let i = 0; i < numAnchors; i++) {
                    let maxConfidence = 0;
                    let classIndex = -1;
                    
                    // 找出 5 個類別中最高分的
                    for (let c = 0; c < numClasses; c++) {
                        const confidence = data[(4 + c) * numAnchors + i];
                        if (confidence > maxConfidence) {
                            maxConfidence = confidence;
                            classIndex = c;
                        }
                    }
                    
                    // 信心閥值設定為 20% (0.20)
                    if (maxConfidence > 0.20) {
                        const cx = data[0 * numAnchors + i];
                        const cy = data[1 * numAnchors + i];
                        const w = data[2 * numAnchors + i];
                        const h = data[3 * numAnchors + i];

                        // 轉換回原始螢幕尺寸的座標
                        const xScale = canvas.width / 640;
                        const yScale = canvas.height / 640;
                        
                        rawBoxes.push({
                            x: (cx - w / 2) * xScale,
                            y: (cy - h / 2) * yScale,
                            width: w * xScale,
                            height: h * yScale,
                            confidence: maxConfidence,
                            classIndex: classIndex
                        });
                    }
                }

                // 第二階段：NMS (非極大值抑制) 過濾重疊框
                // 將框依照信心度從高到低排序
                rawBoxes.sort((a, b) => b.confidence - a.confidence);
                const finalBoxes = [];
                
                while (rawBoxes.length > 0) {
                    const bestBox = rawBoxes.shift(); // 取出最高分的框
                    finalBoxes.push(bestBox);
                    // 過濾掉與 bestBox 重疊率 (IoU) 超過 45% 的其他框
                    rawBoxes = rawBoxes.filter(box => calculateIoU(bestBox, box) < 0.45);
                }

                // 第三階段：畫出最終過濾後的完美框線
                finalBoxes.forEach(box => {
                    const color = classColors[box.classIndex];
                    const labelName = classNames[box.classIndex];

                    // 畫外框
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);

                    // 畫標籤底色
                    ctx.fillStyle = color;
                    ctx.fillRect(box.x, box.y - 25, 180, 25); 
                    
                    // 畫標籤文字與百分比
                    ctx.fillStyle = "white";
                    ctx.font = "bold 16px Arial";
                    ctx.fillText(`${labelName} ${Math.round(box.confidence * 100)}%`, box.x + 5, box.y - 8);
                });
            });

            // 讓手機喘口氣，延遲 300 毫秒再算下一張 (可視手機效能調整)
            setTimeout(() => {
                requestAnimationFrame(detectFrame);
            }, 300);
        }

        async function main() {
            await setupCamera();
            await loadModel();
            detectFrame();
        }

        main();
    </script>
</body>
</html>
